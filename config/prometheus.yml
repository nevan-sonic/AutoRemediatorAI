global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'payment-service'
    static_configs:
      - targets: ['payment-service:8000']
  - job_name: 'inventory-service'
    static_configs:
      - targets: ['inventory-service:8000']
  - job_name: 'order-service'
    static_configs:
      - targets: ['order-service:8000']
